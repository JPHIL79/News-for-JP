

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coin & Market Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --stock-up: #ef4444;
            --coin-down: #3b82f6;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        header {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .date {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            font-size: 1.15rem;
            margin-top: 0;
            color: #f43f5e;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 15px;
        }
        .market-trend-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .trend-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .trend-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .bar-container {
            background-color: #334155;
            border-radius: 6px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
        }
        .bg-stock { background-color: var(--stock-up); }
        .bg-coin { background-color: var(--coin-down); }
        
        /* 📰 구글 뉴스 피드 컨테이너 스타일 */
        .rss-feed-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪙 나만의 마켓 대시보드</h1>
            <div class="date" id="current-date"></div>
        </header>

        <div class="card">
            <h2 style="color: #67e8f9; border-left-color: #67e8f9;">📊 글로벌 자금 쏠림 강도 (Money Move)</h2>
            <div class="market-trend-box">
                <div class="trend-item">
                    <div class="trend-label">
                        <span>🚀 반도체/AI 섹터 자금 유입</span>
                        <span style="color: var(--stock-up); font-weight: bold;">매우 강함 (88%)</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill bg-stock" style="width: 88%;"></div>
                    </div>
                </div>
                <div class="trend-item">
                    <div class="trend-label">
                        <span>📉 가상자산 시장 자금 이탈</span>
                        <span style="color: var(--coin-down); font-weight: bold;">정체/둔화 (32%)</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill bg-coin" style="width: 32%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="padding: 10px;">
            <h2 style="padding-left: 10px; margin-top: 10px; margin-bottom: 10px;">📰 실시간 시장 핵심 속보 (가상자산/반도체)</h2>
            <div class="rss-feed-wrapper">
                <iframe 
                    src="https://www.rssdog.com/index.php?url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D%25EC%25BD%2594%25EC%259D%25B8%2520%25EB%25B0%2592%25EB%258F%2584%25EC%25B2%25B4%2520%25EC%258B%259A%25ED%2599%25A9%26hl%3Dko%26gl%3DKR%26ceid%3DKR%253Ako&mode=html&showonlytitle=1&maxitems=5&showdesc=0&bordercolor=1e293b&bgcolor=1e293b&linkcolor=38bdf8&textcolor=f8fafc&target=blank" 
                    width="100%" 
                    height="350" 
                    frameborder="0" 
                    scrolling="auto">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // 상단 날짜 자동 표시
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ko-KR', options);
    </script>
</body>
</html>
